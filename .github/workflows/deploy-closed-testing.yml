name: Deploy Closed Testing

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: play-alpha-deploy
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out the merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: "stable"
          cache: true
          pub-cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Android SDK tools
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          sdkmanager="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            echo "::error title=Android SDK unavailable::Could not find $sdkmanager"
            exit 1
          fi
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "$sdk_root/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$sdk_root/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android build dependencies
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          sdkmanager="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null
          "$sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" \
            "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - run: flutter pub get --enforce-lockfile

      - name: Validate deployment secrets
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -eu
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            PLAY_SERVICE_ACCOUNT_JSON \
            SUPABASE_URL \
            SUPABASE_ANON_KEY; do
            eval "secret_value=\${$secret_name-}"
            if [ -z "$secret_value" ]; then
              echo "::error title=Missing deployment secret::$secret_name is not configured"
              exit 1
            fi
          done

      - name: Verify merged version bump
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: make -C .. verify-version BASE_REF="$BASE_REF"

      - name: Configure release signing
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/android/upload-keystore.jks
          cat > app/android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed Android App Bundle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: >-
          flutter build appbundle --release
          --dart-define=SUPABASE_URL=$SUPABASE_URL
          --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

      - name: Upload to Google Play Closed testing Alpha
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.tiltozavr2545.amicus
          releaseFiles: app/build/app/outputs/bundle/release/app-release.aab
          tracks: alpha
          status: completed

      - name: Remove signing files
        if: always()
        working-directory: ${{ github.workspace }}
        run: rm -f app/android/key.properties app/android/upload-keystore.jks
